name: Deploy Vite App to GitHub Pages

on:
  # Berjalan saat push ke branch main atau master
  push:
    branches: ["main", "master"]
  
  # Memungkinkan workflow ini dijalankan secara manual dari tab Actions
  workflow_dispatch:

# Menentukan perizinan token (GItHub Actions)
permissions:
  contents: read
  pages: write
  id-token: write

# Hanya izinkan satu deployment bersamaan (membatalkan yang sedang berjalan jika ada push baru)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Job untuk melakukan proses build Vite
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with Vite
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # Job untuk melakukan deployment ke GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
